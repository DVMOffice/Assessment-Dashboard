<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCVM — Assessment Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────────────────── */
    :root {
      --bg:           #EEF0F4;
      --surface:      #FFFFFF;
      --surface-2:    #F6F7F9;
      --surface-3:    #ECEEF2;
      --border:       #DDE1E9;
      --border-2:     #C8CDD8;
      --text:         #111827;
      --text-2:       #374151;
      --text-3:       #6B7280;
      --accent:       #1A3A6B;
      --accent-2:     #14305A;
      --accent-light: #EAF0FB;
      --accent-mid:   #4A6FA5;
      --danger:       #B91C1C;
      --shadow:       0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.04);
      --shadow-md:    0 3px 12px rgba(0,0,0,.09);
      --shadow-lg:    0 8px 28px rgba(0,0,0,.14);
      --radius:       6px;
      --radius-lg:    10px;
      --transition:   160ms cubic-bezier(.4,0,.2,1);
      --font-head:    'Syne', sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --header-h:     58px;
    }
    html.dark {
      --bg: #0A1120; --surface: #111E30; --surface-2: #172438;
      --surface-3: #1E2D44; --border: #253550; --border-2: #2E4268;
      --text: #E8EFF8; --text-2: #96AECB; --text-3: #4E6685;
      --accent-light: #162040;
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.3);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text);
           display: flex; flex-direction: column; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    select, input { font-family: inherit; color: inherit; }
    canvas { display: block; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
    a { text-decoration: none; }

    /* ── Top bar ───────────────────────────────────────────────── */
    .top-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow); position: sticky; top: 0; z-index: 60;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px; flex-shrink: 0;
    }
    .top-bar-left  { display: flex; align-items: center; gap: 16px; }
    .top-bar-right { display: flex; align-items: center; gap: 8px; }

    /* Refined wordmark — no boxy badge */
    .brand {
      display: flex; align-items: baseline; gap: 7px;
    }
    .brand-ucvm {
      font-family: var(--font-head); font-size: 13px; font-weight: 800;
      color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    }
    .brand-sep {
      width: 1px; height: 14px; background: var(--border-2);
      align-self: center; flex-shrink: 0;
    }
    .brand-title {
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text-3); letter-spacing: 0;
    }

    .btn-icon {
      width: 32px; height: 32px; display: flex; align-items: center;
      justify-content: center; font-size: 14px;
      background: transparent; border-radius: var(--radius);
      border: 1px solid var(--border); color: var(--text-3);
      transition: all var(--transition);
    }
    .btn-icon:hover { background: var(--surface-2); color: var(--text); }

    /* ── Filter bar ────────────────────────────────────────────── */
    .filter-bar {
      background: var(--surface-2); border-bottom: 1px solid var(--border);
      position: sticky; top: var(--header-h); z-index: 50; padding: 0 24px;
    }
    .filter-row {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 0; flex-wrap: wrap;
    }
    .fbar-item {
      display: flex; flex-direction: column; gap: 2px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px 10px 4px;
      transition: border-color var(--transition); min-width: 110px;
    }
    .fbar-item:focus-within { border-color: var(--accent); }
    .fbar-search { flex: 1; min-width: 180px; max-width: 260px; flex-direction: row; align-items: center; gap: 6px; padding: 6px 10px; }
    .fbar-course { min-width: 160px; }
    .fbar-label  { font-size: 9.5px; font-weight: 700; color: var(--text-3); letter-spacing: .5px; text-transform: uppercase; line-height: 1; }
    .fbar-icon   { font-size: 12px; opacity: .4; flex-shrink: 0; }
    .fbar-input  { border: none; background: transparent; outline: none; font-size: 13px; color: var(--text); flex: 1; }
    .fbar-input::placeholder { color: var(--text-3); }
    .fbar-select-wrap { display: flex; align-items: center; gap: 3px; }
    .fbar-select { border: none; background: transparent; outline: none; font-size: 13px; color: var(--text); appearance: none; cursor: pointer; flex: 1; }
    .fbar-arrow  { font-size: 14px; color: var(--text-2); pointer-events: none; flex-shrink: 0; }
    .fbar-reset  {
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      color: var(--text-3); border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface);
      transition: all var(--transition); white-space: nowrap;
    }
    .fbar-reset:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
    .active-chips-row { display: flex; align-items: center; gap: 8px; padding: 6px 0 8px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .active-chips-row.hidden { display: none; }
    .chips-label { font-size: 11px; font-weight: 700; color: var(--text-3); white-space: nowrap; }
    .chip-list   { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; background: var(--accent); color: #fff; border-radius: 4px; font-size: 11.5px; font-weight: 600; }
    .chip-x { font-size: 12px; color: rgba(255,255,255,.75); line-height:1; }
    .chip-x:hover { color: #fff; }
    .chips-clear { font-size: 11.5px; font-weight: 600; color: var(--danger); padding: 3px 10px; border: 1px solid var(--danger); border-radius: var(--radius); background: transparent; transition: all var(--transition); }
    .chips-clear:hover { background: var(--danger); color: #fff; }

    /* ── Main layout ───────────────────────────────────────────── */
    .main-content { flex: 1; padding: 16px 24px; }

    /* ── Calendar card ─────────────────────────────────────────── */
    .cal-card  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
    .cal-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 8px; flex-wrap: wrap;
    }
    .cal-nav   { display: flex; align-items: center; gap: 6px; }
    .btn-nav   {
      width: 32px; height: 32px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      font-size: 17px; color: var(--text-2); display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .btn-nav:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cal-label {
      font-family: var(--font-head); font-size: 16px; font-weight: 700;
      color: var(--text); min-width: 180px; text-align: center;
    }
    .btn-today {
      padding: 5px 13px; font-size: 12px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-2); transition: all var(--transition);
    }
    .btn-today:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .view-btn    {
      padding: 5px 14px; font-size: 12px; font-weight: 600; color: var(--text-2);
      background: var(--surface); transition: all var(--transition);
    }
    .view-btn.active { background: var(--accent); color: #fff; }
    .view-btn:not(.active):hover { background: var(--surface-2); }

    /* ── Month grid ────────────────────────────────────────────── */
    .cal-month { padding: 0; }
    .cal-dow-header {
      display: grid; grid-template-columns: repeat(7,1fr);
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .cal-dow { padding: 8px 0; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: .5px; text-transform: uppercase; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-cell {
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 6px 5px 5px; min-height: 100px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-other { background: var(--surface-2); }
    .cal-other .cal-date-num { color: var(--text-3); opacity: .45; }
    .cal-today { background: var(--accent-light); }
    .cal-date-num { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 2px; }
    .today-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 12px; font-weight: 700;
    }
    .cal-events { display: flex; flex-direction: column; gap: 2px; }
    .cal-event {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 5px; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-weight: 500; color: var(--text);
      transition: all var(--transition); border-left: 2px solid transparent;
    }
    .cal-event:hover { opacity: .85; transform: translateX(1px); }
    .cal-event-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cal-event-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-event-hidden { display: none; }
    .cal-overflow-wrap { display: flex; flex-direction: column; gap: 2px; }
    .cal-more-btn {
      font-size: 10.5px; font-weight: 700; color: var(--accent);
      background: var(--accent-light); border: 1px solid var(--accent);
      border-radius: 3px; padding: 2px 6px; margin-top: 2px;
      cursor: pointer; transition: all var(--transition); align-self: flex-start;
    }
    .cal-more-btn:hover { background: var(--accent); color: #fff; }

    /* ── Week view ─────────────────────────────────────────────── */
    .cal-week {}
    .cal-week-header { display: grid; grid-template-columns: repeat(7,1fr); background: var(--surface-2); border-bottom: 1px solid var(--border); }
    .cal-week-day-head { padding: 8px 0; text-align: center; border-right: 1px solid var(--border); }
    .cal-week-day-head:last-child { border-right: none; }
    .cal-week-day-head.today-head { background: var(--accent-light); }
    .week-dow   { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
    .week-date  { font-size: 16px; font-weight: 700; color: var(--text-2); margin-top: 2px; }
    .week-date.today-dot {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 14px;
    }
    .cal-week-body { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-week-col  { border-right: 1px solid var(--border); padding: 8px 6px; min-height: 120px; display: flex; flex-direction: column; gap: 5px; }
    .cal-week-col:last-child { border-right: none; }
    .cal-week-col.today-col { background: var(--accent-light); }
    .cal-week-event {
      padding: 6px 8px; border-radius: 5px; cursor: pointer;
      transition: all var(--transition); border-left: 3px solid transparent;
    }
    .cal-week-event:hover { filter: brightness(.95); }
    .wev-course  { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
    .wev-detail  { font-size: 11px; color: var(--text); font-weight: 500; line-height: 1.3; }
    .wev-meta    { font-size: 10px; color: var(--text-3); margin-top: 3px; }

    /* ── Color legend ──────────────────────────────────────────── */
    .legend-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow);
      padding: 14px 18px; margin-bottom: 14px;
    }
    .legend-title { font-family: var(--font-head); font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .legend-grid  { display: flex; flex-wrap: wrap; gap: 8px; }
    .legend-item  { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--text); }
    .legend-dot   { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── Assessment list (upcoming) ────────────────────────────── */
    .upcoming-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow);
      margin-top: 14px; overflow: hidden;
    }
    .upcoming-header {
      padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
      background: var(--surface-2); display: flex; align-items: center; justify-content: space-between;
    }
    .upcoming-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--text); }
    .upcoming-hint  { font-size: 11.5px; color: var(--text-3); }
    .upcoming-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .upcoming-table thead th {
      padding: 9px 14px; text-align: left; font-size: 10.5px; font-weight: 700;
      letter-spacing: .5px; color: var(--text-3); border-bottom: 2px solid var(--border);
      background: var(--surface-2); text-transform: uppercase; white-space: nowrap;
    }
    .urow { border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); }
    .urow:last-child { border-bottom: none; }
    .urow:hover { background: var(--accent-light); }
    .urow td { padding: 10px 14px; vertical-align: middle; }
    .urow-date    { color: var(--text-2); white-space: nowrap; font-weight: 500; }
    .urow-course  { display: inline-block; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 3px; color: #fff; margin-right: 6px; }
    .urow-name    { font-size: 12.5px; color: var(--text); font-weight: 500; }
    .urow-detail  { color: var(--text-3); font-size: 12px; }
    .urow-type    { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .urow-weight  { text-align: right; font-weight: 700; color: var(--text-2); white-space: nowrap; }
    .empty-state  { text-align: center; color: var(--text-3); font-size: 13px; padding: 32px; }

    /* ── Modal ─────────────────────────────────────────────────── */
    .modal-container { display: none; }
    .modal-container.open { display: block; position: fixed; inset: 0; z-index: 200; }
    .modal-backdrop  { position: absolute; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(2px); }
    .modal-box       { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                       background: var(--surface); border: 1px solid var(--border);
                       border-radius: var(--radius-lg); width: min(500px,94vw); max-height: 88vh;
                       overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn .2s ease; }
    @keyframes modalIn { from{opacity:0;transform:translate(-50%,-47%) scale(.97)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
    .modal-strip   { height: 5px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .modal-close   {
      position: absolute; top: 13px; right: 13px; width: 28px; height: 28px;
      border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-2); display: flex; align-items: center;
      justify-content: center; transition: all var(--transition);
    }
    .modal-close:hover { background: var(--danger); color: #fff; }
    .modal-header  { padding: 18px 22px 13px; }
    .modal-badge   { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 3px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
    .modal-title   { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .modal-sub     { font-size: 12px; color: var(--text-3); margin-top: 5px; }
    .modal-body    { padding: 0 22px 4px; }
    .mrow          { display: flex; align-items: baseline; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .mrow:last-child { border-bottom: none; }
    .mrow-icon     { width: 18px; text-align: center; flex-shrink: 0; opacity: .6; }
    .mrow-label    { width: 100px; flex-shrink: 0; color: var(--text-3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
    .mrow-value    { color: var(--text); font-weight: 500; flex: 1; font-size: 13px; }
    .modal-footer  { padding: 14px 22px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); }
    .btn           { padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: var(--radius); transition: all var(--transition); font-family: var(--font-body); cursor: pointer; }
    .btn-primary   { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
    .btn-primary:hover { background: var(--accent-2); }
    .btn-secondary { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-3); }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .main-content { padding: 12px 14px; }
      .top-bar { padding: 0 14px; }
      .filter-bar { padding: 0 14px; }
      .cal-cell { min-height: 72px; }
    }
    @media (max-width: 640px) {
      .fbar-course { min-width: 130px; }
      .cal-cell { min-height: 56px; padding: 4px 3px; }
    }
  </style>
</head>
<body>

  <!-- ══ TOP BAR ══════════════════════════════════════════════════ -->
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="brand">
        <span class="brand-ucvm">UCVM</span>
        <span class="brand-sep"></span>
        <span class="brand-title">Assessment Calendar</span>
      </div>
    </div>
    <div class="top-bar-right">
      <button id="dark-toggle" class="btn-icon" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <!-- ══ FILTER BAR ═══════════════════════════════════════════════ -->
  <div class="filter-bar">
    <div class="filter-row">
      <div class="fbar-item fbar-search">
        <span class="fbar-icon">🔍</span>
        <input type="text" id="search-input" class="fbar-input" placeholder="Search course, assessment…" />
      </div>
      <div class="fbar-item">
        <label class="fbar-label">Year</label>
        <div class="fbar-select-wrap">
          <select id="filter-year" class="fbar-select"><option value="all">All Years</option></select>
          <span class="fbar-arrow">▾</span>
        </div>
      </div>
      <div class="fbar-item">
        <label class="fbar-label">Month</label>
        <div class="fbar-select-wrap">
          <select id="filter-month" class="fbar-select">
            <option value="all">All Months</option>
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
          <span class="fbar-arrow">▾</span>
        </div>
      </div>
      <div class="fbar-item fbar-course">
        <label class="fbar-label">Course</label>
        <div class="fbar-select-wrap">
          <select id="filter-course" class="fbar-select"><option value="all">All Courses</option></select>
          <span class="fbar-arrow">▾</span>
        </div>
      </div>
      <div class="fbar-item">
        <label class="fbar-label">Type</label>
        <div class="fbar-select-wrap">
          <select id="filter-type" class="fbar-select"><option value="all">All Types</option></select>
          <span class="fbar-arrow">▾</span>
        </div>
      </div>
      <button id="reset-filters" class="fbar-reset">↺ Reset</button>
    </div>
    <div id="active-chips-row" class="active-chips-row hidden">
      <span class="chips-label">Active:</span>
      <div id="chip-list" class="chip-list"></div>
      <button id="clear-all" class="chips-clear">Clear all</button>
    </div>
  </div>

  <!-- ══ MAIN CONTENT ═════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Calendar -->
    <div class="cal-toolbar">
      <div class="cal-nav">
        <button class="btn-nav" id="cal-prev">‹</button>
        <span class="cal-label" id="cal-label"></span>
        <button class="btn-nav" id="cal-next">›</button>
        <button class="btn-today" id="cal-today">Today</button>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="month-btn">Month</button>
        <button class="view-btn" id="week-btn">Week</button>
      </div>
    </div>

    <div class="cal-card">
      <div id="calendar-body"></div>
    </div>

    <!-- Upcoming assessments -->
    <div class="upcoming-section">
      <div class="upcoming-header">
        <div class="upcoming-title">📋 Upcoming Assessments</div>
        <div class="upcoming-hint">Sorted by date · click a row for details</div>
      </div>
      <div id="upcoming-body" style="overflow-x:auto"></div>
    </div>

  </main>

  <!-- Modal -->
  <div id="modal" class="modal-container"></div>

  <!-- Core modules (shared with admin) -->
  <script src="dataParser.js"></script>
  <script src="calendarEngine.js"></script>

  <script>
  (async function() {
    'use strict';

    // ── Load data ────────────────────────────────────────────────
    let rawData = [];
    try {
      const res = await fetch('./data.csv');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      rawData = await DataParser.loadFromText(await res.text());
    } catch (err) {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#1E3A5F;color:#EBF1FA;flex-direction:column;gap:16px;padding:32px;text-align:center">
        <div style="font-size:48px">📋</div>
        <h2>Could not load data.csv</h2>
        <p style="color:#90AECB;max-width:400px">${err.message}<br><br>Make sure data.csv is in the same folder.</p></div>`;
      return;
    }

    // ── State ────────────────────────────────────────────────────
    const colorMap  = CalendarEngine.getCourseColorMap(rawData);
    let calDate     = new Date();
    let calView     = 'month';
    let darkMode    = JSON.parse(localStorage.getItem('student_dark') || 'false');
    let filters     = { year: 'all', month: 'all', course: 'all', type: 'all', search: '' };

    // Apply saved dark mode
    if (darkMode) document.documentElement.classList.add('dark');
    document.getElementById('dark-toggle').textContent = darkMode ? '☀️' : '🌙';

    // ── Populate dropdowns ───────────────────────────────────────
    const yearEl   = document.getElementById('filter-year');
    const courseEl = document.getElementById('filter-course');
    const typeEl   = document.getElementById('filter-type');

    [...new Set(rawData.map(a => a.year))].sort().forEach(y => {
      const o = document.createElement('option'); o.value = y; o.textContent = `Year ${y}`; yearEl.appendChild(o);
    });
    [...new Map(rawData.map(a => [a.course, a.courseName])).entries()].sort((a,b) => a[0]-b[0]).forEach(([id,name]) => {
      const o = document.createElement('option'); o.value = id; o.textContent = `${id} – ${name.slice(0,28)}`; courseEl.appendChild(o);
    });
    [...new Set(rawData.map(a => a.type))].sort().forEach(t => {
      const o = document.createElement('option'); o.value = t; o.textContent = t; typeEl.appendChild(o);
    });

    // ── Filter logic ─────────────────────────────────────────────
    function getFiltered() {
      let data = [...rawData];
      if (filters.year   !== 'all') data = data.filter(a => String(a.year)   === String(filters.year));
      if (filters.month  !== 'all') data = data.filter(a => a.effectiveDate && (a.effectiveDate.getMonth()+1) === parseInt(filters.month));
      if (filters.course !== 'all') data = data.filter(a => String(a.course) === String(filters.course));
      if (filters.type   !== 'all') data = data.filter(a => a.type           === filters.type);
      if (filters.search) {
        const q = filters.search.toLowerCase();
        data = data.filter(a => a.courseName.toLowerCase().includes(q) || a.type.toLowerCase().includes(q) || a.details.toLowerCase().includes(q) || String(a.course).includes(q));
      }
      return data;
    }

    // ── Filter chips ─────────────────────────────────────────────
    const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
    function renderChips() {
      const active = [];
      if (filters.year   !== 'all') active.push({k:'year',   l:`Year ${filters.year}`});
      if (filters.month  !== 'all') active.push({k:'month',  l:`Month: ${MONTHS[parseInt(filters.month)]}`});
      if (filters.course !== 'all') { const n = rawData.find(a=>String(a.course)===String(filters.course))?.courseName||''; active.push({k:'course', l:`Course: ${filters.course}${n?' – '+n.slice(0,18):''}`}); }
      if (filters.type   !== 'all') active.push({k:'type',   l:`Type: ${filters.type}`});
      if (filters.search)           active.push({k:'search', l:`"${filters.search}"`});

      const row = document.getElementById('active-chips-row');
      const list = document.getElementById('chip-list');
      if (!active.length) { row.classList.add('hidden'); return; }
      row.classList.remove('hidden');
      list.innerHTML = active.map(c =>
        `<span class="chip">${c.l}<button class="chip-x" data-k="${c.k}">×</button></span>`
      ).join('');
      list.querySelectorAll('.chip-x').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const k = btn.dataset.k;
          filters[k] = k === 'search' ? '' : 'all';
          if (k !== 'search') document.getElementById(`filter-${k}`).value = 'all';
          else document.getElementById('search-input').value = '';
          render();
        });
      });
    }

    // ── Calendar render ──────────────────────────────────────────
    function renderCalendar() {
      const data = getFiltered();
      const el   = document.getElementById('calendar-body');
      const labelEl = document.getElementById('cal-label');

      if (calView === 'month') {
        labelEl.textContent = CalendarEngine.monthLabel(calDate);
        renderMonthView(el, data);
      } else {
        const days = CalendarEngine.buildWeekDays(calDate);
        labelEl.textContent = CalendarEngine.weekLabel(days);
        renderWeekView(el, days, data);
      }
    }

    function renderMonthView(container, data) {
      const cells = CalendarEngine.buildMonthGrid(calDate.getFullYear(), calDate.getMonth());
      const DOW   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      let html = `<div class="cal-month">
        <div class="cal-dow-header">${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
        <div class="cal-grid">`;

      cells.forEach(cell => {
        const events  = CalendarEngine.getEventsForDate(data, cell.date);
        const isToday = CalendarEngine.isToday(cell.date);
        const cls     = ['cal-cell', !cell.current && 'cal-other', isToday && 'cal-today'].filter(Boolean).join(' ');
        html += `<div class="${cls}">
          <div class="cal-date-num">${isToday ? `<span class="today-dot">${cell.date.getDate()}</span>` : cell.date.getDate()}</div>
          <div class="cal-events">`;
        const MAX = 3;
        events.slice(0, MAX).forEach(ev => {
          const color = colorMap[ev.course] || '#1A3A6B';
          html += `<div class="cal-event" style="background:${color}18;border-left-color:${color}" data-id="${ev._id}">
            <span class="cal-event-dot" style="background:${color}"></span>
            <span class="cal-event-text">${ev.course} · ${ev.type}${ev.weight ? ' '+ev.weight+'%' : ''}</span>
          </div>`;
        });
        if (events.length > MAX) {
          const overflow = events.slice(MAX);
          html += `<div class="cal-overflow-wrap">`;
          overflow.forEach(ev => {
            const color = colorMap[ev.course] || '#1A3A6B';
            html += `<div class="cal-event cal-event-hidden" style="background:${color}18;border-left-color:${color}" data-id="${ev._id}">
              <span class="cal-event-dot" style="background:${color}"></span>
              <span class="cal-event-text">${ev.course} · ${ev.type}${ev.weight ? ' '+ev.weight+'%' : ''}</span>
            </div>`;
          });
          html += `<button class="cal-more-btn" data-count="${overflow.length}">+${overflow.length} more</button></div>`;
        }
        html += `</div></div>`;
      });
      html += '</div></div>';
      container.innerHTML = html;
      wireCalendarEvents(container);
    }

    function renderWeekView(container, days, data) {
      const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      let html = `<div class="cal-week"><div class="cal-week-header">`;
      days.forEach((d,i) => {
        const isTd = CalendarEngine.isToday(d);
        html += `<div class="cal-week-day-head ${isTd?'today-head':''}">
          <div class="week-dow">${DOW[i]}</div>
          <div class="week-date ${isTd?'today-dot':''}">${d.getDate()}</div>
        </div>`;
      });
      html += '</div><div class="cal-week-body">';
      days.forEach(d => {
        const events  = CalendarEngine.getEventsForDate(data, d);
        const isTd    = CalendarEngine.isToday(d);
        html += `<div class="cal-week-col ${isTd?'today-col':''}">`;
        events.forEach(ev => {
          const color = colorMap[ev.course] || '#1A3A6B';
          html += `<div class="cal-week-event" style="background:${color}18;border-left-color:${color}" data-id="${ev._id}">
            <div class="wev-course" style="color:${color}">${ev.course} · ${ev.type}</div>
            <div class="wev-detail">${ev.details || ev.courseName.split(' ').slice(0,4).join(' ')}</div>
            <div class="wev-meta">${ev.weight ? ev.weight+'% · ' : ''}${ev.startTime && ev.startTime !== 'N/A' ? ev.startTime.slice(0,5) : ''}</div>
          </div>`;
        });
        if (!events.length) html += `<div style="min-height:30px"></div>`;
        html += '</div>';
      });
      html += '</div></div>';
      container.innerHTML = html;
      wireCalendarEvents(container);
    }

    function wireCalendarEvents(container) {
      container.querySelectorAll('.cal-event, .cal-week-event').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); openModal(el.dataset.id); });
      });
      container.querySelectorAll('.cal-more-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const wrap     = btn.closest('.cal-overflow-wrap');
          const hidden   = wrap.querySelectorAll('.cal-event-hidden');
          const expanded = btn.dataset.expanded === '1';
          hidden.forEach(el => {
            el.style.display = expanded ? 'none' : 'flex';
            if (!expanded) el.onclick = e2 => { e2.stopPropagation(); openModal(el.dataset.id); };
          });
          btn.dataset.expanded = expanded ? '0' : '1';
          btn.textContent      = expanded ? `+${btn.dataset.count} more` : 'Show less';
        });
      });
    }

    // ── Upcoming list ─────────────────────────────────────────────
    function renderUpcoming() {
      const el   = document.getElementById('upcoming-body');
      const data = getFiltered();
      const today = new Date(); today.setHours(0,0,0,0);
      const upcoming = data
        .filter(a => a.effectiveDate && a.effectiveDate >= today)
        .sort((a,b) => a.effectiveDate - b.effectiveDate)
        .slice(0, 30);

      if (!upcoming.length) {
        el.innerHTML = `<div class="empty-state">📭 No upcoming assessments found for this selection.</div>`;
        return;
      }
      el.innerHTML = `<table class="upcoming-table">
        <thead><tr>
          <th>Date</th><th>Course</th><th>Assessment</th><th>Type</th><th style="text-align:right">Weight</th>
        </tr></thead>
        <tbody>${upcoming.map(a => {
          const color = colorMap[a.course] || '#1A3A6B';
          const dStr  = a.effectiveDate.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
          return `<tr class="urow" data-id="${a._id}">
            <td class="urow-date">${dStr}</td>
            <td><span class="urow-course" style="background:${color}">${a.course}</span><span class="urow-name">${a.courseName.split(' ').slice(0,5).join(' ')}</span></td>
            <td class="urow-detail">${a.details || '—'}</td>
            <td><span class="urow-type" style="color:${color};background:${color}18">${a.type}</span></td>
            <td class="urow-weight">${a.weightRaw || '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
      el.querySelectorAll('.urow').forEach(row => row.addEventListener('click', () => openModal(row.dataset.id)));
    }

    // ── Modal ─────────────────────────────────────────────────────
    function openModal(id) {
      const a = rawData.find(x => x._id === id);
      if (!a) return;
      const color = colorMap[a.course] || '#1A3A6B';
      const modal = document.getElementById('modal');
      const fmtD  = d => d ? new Date(d).toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '—';
      modal.innerHTML = `
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-box">
          <div class="modal-strip" style="background:${color}"></div>
          <button class="modal-close" id="modal-close">✕</button>
          <div class="modal-header">
            <span class="modal-badge" style="background:${color}18;color:${color}">${a.type}</span>
            <h2 class="modal-title">${a.courseName}</h2>
            <div class="modal-sub">Course ${a.course} · Year ${a.year} · ${a.term}</div>
          </div>
          <div class="modal-body">
            ${a.instructor ? mrow('👤','Coordinator', a.instructor) : ''}
            ${mrow('📋','Details',    a.details || '—')}
            ${mrow('⚖️','Weight',     a.weightRaw || '—')}
            ${mrow('📅','Date',       fmtD(a.effectiveDate))}
            ${a.startTime && a.startTime !== 'N/A' ? mrow('🕐','Time', `${a.startTime.slice(0,5)}${a.endTime && a.endTime!=='N/A' ? ' – '+a.endTime.slice(0,5) : ''}`) : ''}
            ${a.duration  ? mrow('⏱️','Duration',  a.duration)  : ''}
            ${a.location  ? mrow('📍','Location',  a.location)  : ''}
            ${a.openClosebook ? mrow('📖','Book Policy', a.openClosebook) : ''}
            ${a.format    ? mrow('💻','Format',    a.format)    : ''}
            ${a.calculator && a.calculator !== 'N/A' ? mrow('🔢','Calculator', a.calculator) : ''}
            ${a.notes     ? mrow('📝','Notes',     a.notes)     : ''}
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="modal-cal">View in Calendar</button>
            <button class="btn btn-primary"   id="modal-close2">Close</button>
          </div>
        </div>`;
      modal.classList.add('open');
      modal.querySelector('#modal-close').onclick    = closeModal;
      modal.querySelector('#modal-close2').onclick   = closeModal;
      modal.querySelector('#modal-backdrop').onclick = closeModal;
      modal.querySelector('#modal-cal').onclick = () => {
        closeModal();
        if (a.effectiveDate) {
          calDate = new Date(a.effectiveDate);
          calView = 'week';
          document.getElementById('month-btn').classList.remove('active');
          document.getElementById('week-btn').classList.add('active');
        }
        render();
      };
    }
    function mrow(icon, label, value) {
      return `<div class="mrow"><span class="mrow-icon">${icon}</span><span class="mrow-label">${label}</span><span class="mrow-value">${value}</span></div>`;
    }
    function closeModal() {
      const m = document.getElementById('modal');
      m.classList.remove('open'); m.innerHTML = '';
    }

    // ── Master render ─────────────────────────────────────────────
    function render() {
      renderCalendar();
      renderUpcoming();
      renderChips();
    }

    // ── Wire UI ───────────────────────────────────────────────────
    document.getElementById('cal-prev').addEventListener('click', () => {
      calDate = calView === 'month' ? CalendarEngine.prevMonth(calDate) : CalendarEngine.prevWeek(calDate);
      render();
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      calDate = calView === 'month' ? CalendarEngine.nextMonth(calDate) : CalendarEngine.nextWeek(calDate);
      render();
    });
    document.getElementById('cal-today').addEventListener('click', () => { calDate = new Date(); render(); });
    document.getElementById('month-btn').addEventListener('click', () => {
      calView = 'month';
      document.getElementById('month-btn').classList.add('active');
      document.getElementById('week-btn').classList.remove('active');
      render();
    });
    document.getElementById('week-btn').addEventListener('click', () => {
      calView = 'week';
      document.getElementById('week-btn').classList.add('active');
      document.getElementById('month-btn').classList.remove('active');
      render();
    });
    document.getElementById('filter-year').addEventListener('change',   e => { filters.year   = e.target.value; render(); });
    document.getElementById('filter-month').addEventListener('change',  e => { filters.month  = e.target.value; render(); });
    document.getElementById('filter-course').addEventListener('change', e => { filters.course = e.target.value; render(); });
    document.getElementById('filter-type').addEventListener('change',   e => { filters.type   = e.target.value; render(); });
    document.getElementById('search-input').addEventListener('input',   e => { filters.search = e.target.value; render(); });
    document.getElementById('reset-filters').addEventListener('click', () => {
      filters = { year:'all', month:'all', course:'all', type:'all', search:'' };
      ['filter-year','filter-month','filter-course','filter-type'].forEach(id => document.getElementById(id).value='all');
      document.getElementById('search-input').value = '';
      render();
    });
    document.getElementById('clear-all').addEventListener('click', () => {
      filters = { year:'all', month:'all', course:'all', type:'all', search:'' };
      ['filter-year','filter-month','filter-course','filter-type'].forEach(id => document.getElementById(id).value='all');
      document.getElementById('search-input').value = '';
      render();
    });
    document.getElementById('dark-toggle').addEventListener('click', () => {
      darkMode = !darkMode;
      document.documentElement.classList.toggle('dark', darkMode);
      document.getElementById('dark-toggle').textContent = darkMode ? '☀️' : '🌙';
      localStorage.setItem('student_dark', JSON.stringify(darkMode));
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Initial render
    render();

  })();
  </script>
</body>
</html>
